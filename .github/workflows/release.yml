name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Git tag to release e.g. 1.2.3-4"
        type: string
        required: true

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/joinself/tools
    permissions:
      contents: write
    steps:
      - uses: joinself/actions-public/setup-job@main
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_version=$(${SCRIPTS}/get-current-version)
          release_version="${current_version%-*}"

          git tag -a ${release_version} -m "${release_version}"
          git push origin ${release_version}

          patch_version="${release_version#*.*.}"
          if [[ "${patch_version}" == "0" ]]; then
            git checkout -b release-${release_version%.*}
            git push origin release-${release_version%.*}
          fi

          main_current_release=$(${SCRIPTS}/get-current-version --branch origin/main --type release)
          if [[ "${patch_version}" != 0 ]] && [[ "${main_current_release%.*}" != "${release_version%.*}" ]]; then
            gh release create "${release_version}" --latest=false
          else
            gh release create "${release_version}"
          fi
