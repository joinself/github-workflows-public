name: License compliance

on:
  workflow_call:
    inputs:
      container-image:
        type: string
        default: ghcr.io/joinself/license-finder:go
      continue-on-error:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  license-compliance:
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.container-image }}
    steps:
      - uses: actions/checkout@v6
      - name: License check
        run: |
          HOME=/root
          if [[ -f Gemfile ]]; then
            bundle install
          elif [[ -f package.json ]]; then
            npm install
          fi
          curl -Lo /tmp/dependency_decisions.yml https://static.joinself.com/license-finder/dependency_decisions.yml
          license_finder --decisions_file /tmp/dependency_decisions.yml
        continue-on-error: ${{ inputs.continue-on-error }}
